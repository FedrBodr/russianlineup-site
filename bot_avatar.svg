<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c2433"/>
      <stop offset="1" stop-color="#06151f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2ff0d6"/>
      <stop offset="1" stop-color="#16c4d6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16e0c8"/>
      <stop offset="1" stop-color="#3aa0ff"/>
    </linearGradient>
  </defs>

  <!-- background (Telegram crops to a circle) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- sun disc -->
  <circle cx="256" cy="222" r="120" fill="url(#sun)"/>

  <!-- back wave (solid muted teal) -->
  <path d="M-20 330 C 90 296, 165 350, 262 334 S 430 296, 540 332 L 540 560 L -20 560 Z" fill="#15867f"/>

  <!-- front wave (brand gradient) -->
  <path d="M-20 382 C 100 344, 175 404, 270 386 S 442 348, 540 388 L 540 560 L -20 560 Z" fill="url(#wave)"/>

  <!-- spray -->
  <circle cx="150" cy="352" r="6" fill="#eaf6fb" opacity="0.85"/>
  <circle cx="372" cy="356" r="5" fill="#eaf6fb" opacity="0.7"/>

  <!-- board -->
  <ellipse cx="256" cy="320" rx="80" ry="13" transform="rotate(-8 256 320)" fill="#eaf6fb"/>

  <!-- surfer (thick rounded icon strokes) -->
  <g fill="none" stroke="#eaf6fb" stroke-width="17" stroke-linecap="round" stroke-linejoin="round">
    <!-- torso -->
    <path d="M258 214 L 251 264"/>
    <!-- back leg -->
    <path d="M251 264 L 230 302"/>
    <!-- front leg -->
    <path d="M251 264 L 280 300"/>
    <!-- back arm raised -->
    <path d="M254 230 L 224 206"/>
    <!-- front arm reaching forward -->
    <path d="M254 234 L 296 250"/>
  </g>
  <!-- head -->
  <circle cx="261" cy="196" r="19" fill="#eaf6fb"/>
</svg>
